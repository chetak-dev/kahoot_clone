name: kahoot_clone
description: A Kahoot clone built with Flutter and Firebase.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_database: ^11.0.0
  go_router: ^14.0.0
  flutter_riverpod: ^2.5.1
  uuid: ^4.4.0
  file_picker: ^8.0.0
  excel: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
  # add asset folders only if you actually have them:
  # assets:
  #   - assets/images/
